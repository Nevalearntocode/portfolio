<!doctype html><html><head><meta charset="utf-8"><title>Brand — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:18px 24px;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:center;}
  .logo{background:#000;border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:center;height:140px;border:0.5px solid var(--hairline-06);}
  .logo img{max-width:100%;max-height:100%;object-fit:contain;}
  .right{display:flex;flex-direction:column;gap:8px;}
  .word{font-family:var(--font-serif);font-style:italic;font-size:40px;color:#fff;line-height:1;}
  .lbl{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.18em;color:var(--fg4);}
  .desc{font-size:11px;color:var(--fg2);line-height:1.6;margin-top:4px;}
</style></head><body><div class="card">
  <div class="logo"><img src="../assets/logo.jpg" alt="NEVA logo"/></div>
  <div class="right">
    <div class="word">Minh Tâm</div>
    <div class="lbl">Word-mark · Instrument Serif italic</div>
    <div class="desc">Personal/image mark uses NEVA logo; editorial contexts use the word-mark only.</div>
  </div>
</div></body></html>
