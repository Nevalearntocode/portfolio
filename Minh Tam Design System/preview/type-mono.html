<!doctype html><html><head><meta charset="utf-8"><title>Type — Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:22px 24px;font-family:var(--font-sans);color:var(--fg1);}
  .row{display:flex;gap:28px;flex-wrap:wrap;align-items:center;}
  .eb{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.25em;color:var(--brand);display:flex;align-items:center;gap:8px;}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--brand);}
  .seq{font-family:var(--font-mono);font-size:9px;letter-spacing:0.20em;color:rgba(123,57,252,0.5);}
  .scatter{font-family:var(--font-mono);font-size:9px;letter-spacing:0.06em;color:var(--brand);}
  .metric{display:flex;align-items:baseline;gap:2px;}
  .metric .v{font-family:var(--font-sans);font-weight:700;font-size:30px;color:var(--fg1);line-height:1;}
  .metric .u{color:var(--brand);font-size:18px;font-weight:700;}
  .label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.18em;color:var(--fg4);margin-top:14px;}
</style></head><body><div class="card">
  <div class="row">
    <div class="eb"><span class="dot"></span>AVAILABLE FOR NEW PROJECTS · 2026</div>
    <div class="seq">001 / 006</div>
    <div class="scatter">lat: 1.2ms</div>
    <div class="scatter">0xf3a1</div>
    <div class="scatter">node_14</div>
    <div class="metric"><span class="v">700k</span><span class="u">+</span></div>
  </div>
  <div class="label">DM Mono 400/500 · eyebrows, sequence, scatter, metric units</div>
</div></body></html>
