<!doctype html><html><head><meta charset="utf-8"><title>Components — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:22px 24px;font-family:var(--font-sans);}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .btn-primary{font-family:var(--font-sans);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;background:var(--brand);color:#0e0e0e;padding:12px 24px;text-decoration:none;font-weight:600;border:0;cursor:pointer;}
  .btn-secondary{font-family:var(--font-sans);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;background:transparent;border:0.5px solid var(--brand-a30);color:var(--fg3);padding:12px 24px;cursor:pointer;}
  .btn-pill{display:inline-flex;align-items:center;gap:10px;padding:14px 26px;border-radius:9999px;background:var(--brand);color:#fff;font-weight:700;font-size:14px;box-shadow:0 8px 24px var(--brand-a20);cursor:pointer;border:0;}
  .btn-pill .arr{transition:transform .2s;}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:var(--fg4);text-transform:uppercase;}
</style></head><body><div class="card">
  <div class="row">
    <button class="btn-primary">Get Started</button>
    <button class="btn-secondary">Browse Templates</button>
    <button class="btn-pill"><span>Let's talk</span><span class="arr">→</span></button>
  </div>
  <div class="lbl">Hero rectangle · secondary outline · CTA pill with violet glow shadow</div>
</div></body></html>
