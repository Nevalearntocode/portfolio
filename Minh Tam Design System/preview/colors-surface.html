<!doctype html><html><head><meta charset="utf-8"><title>Colors — Surface Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:20px 22px;font-family:var(--font-sans);color:var(--fg1);}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
  .sw{border-radius:var(--radius-md);padding:10px 12px;min-height:92px;display:flex;flex-direction:column;justify-content:space-between;border:0.5px solid var(--hairline-06);}
  .sw .name{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:var(--fg3);}
  .sw .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg2);}
  .note{margin-top:10px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:var(--fg4);text-transform:uppercase;}
</style></head><body><div class="card">
  <div class="row">
    <div class="sw" style="background:#0e0e0e"><span class="name">lowest</span><span class="hex">#0e0e0e</span></div>
    <div class="sw" style="background:#131313"><span class="name">surface</span><span class="hex">#131313</span></div>
    <div class="sw" style="background:#1b1b1b"><span class="name">low</span><span class="hex">#1b1b1b</span></div>
    <div class="sw" style="background:#1f1f1f"><span class="name">container</span><span class="hex">#1f1f1f</span></div>
    <div class="sw" style="background:#2a2a2a"><span class="name">high</span><span class="hex">#2a2a2a</span></div>
    <div class="sw" style="background:#353535"><span class="name">highest</span><span class="hex">#353535</span></div>
  </div>
  <div class="note">Aura Noir — 6-step dark surface scale</div>
</div></body></html>
