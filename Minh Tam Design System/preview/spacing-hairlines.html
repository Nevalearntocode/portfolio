<!doctype html><html><head><meta charset="utf-8"><title>Spacing — Hairlines & Borders</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:22px 24px;font-family:var(--font-sans);color:var(--fg1);}
  .sample{padding:14px 18px;margin-bottom:10px;border-radius:12px;background:var(--surface-container);display:flex;justify-content:space-between;align-items:center;}
  .sample .l{font-family:var(--font-mono);font-size:11px;color:var(--fg2);}
  .sample .r{font-family:var(--font-mono);font-size:10px;color:var(--fg4);}
  .s1{border:0.5px solid rgba(123,57,252,0.10);}
  .s2{border:0.5px solid rgba(123,57,252,0.30);}
  .s3{border:0.5px solid rgba(255,255,255,0.05);}
  .s4{border:1px solid rgba(123,57,252,0.35);background:rgba(123,57,252,0.08);}
</style></head><body><div class="card">
  <div class="sample s1"><span class="l">violet 10 hairline</span><span class="r">0.5px · default divider</span></div>
  <div class="sample s2"><span class="l">violet 30 hairline</span><span class="r">0.5px · secondary CTA border</span></div>
  <div class="sample s3"><span class="l">white 5 hairline</span><span class="r">0.5px · neutral card border</span></div>
  <div class="sample s4"><span class="l">proof chip</span><span class="r">violet-35 / bg violet-08</span></div>
</div></body></html>
