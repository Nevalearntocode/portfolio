<!doctype html><html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:22px 24px;}
  .eyebrow{margin-bottom:10px;}
  .display{font-family:var(--font-sans);font-weight:700;font-size:52px;line-height:1.0;letter-spacing:-0.03em;color:var(--fg1);margin:0;}

  <p class="eyebrow">DISPLAY &middot; H1</p>

  <div class="meta">DM Sans 700 &middot; 52px &middot; -0.03em &middot; #f0e6ff + #7b39fc</div>
</div></body></html>
