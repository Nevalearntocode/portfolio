<!doctype html><html><head><meta charset="utf-8"><title>Components — Chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:22px 24px;font-family:var(--font-sans);}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .chip{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;padding:6px 12px;font-family:var(--font-sans);}
  .chip.on{border:0.5px solid var(--brand-a35);background:var(--brand-a08);color:rgba(123,57,252,0.85);}
  .chip.off{border:0.5px solid rgba(238,234,248,0.10);color:rgba(238,234,248,0.35);}
  .chip.round{border-radius:9999px;border:0.5px solid rgba(123,57,252,0.20);color:#d0bcff;padding:5px 12px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--brand);display:inline-block;margin-right:6px;vertical-align:middle;}
  .lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:var(--fg4);text-transform:uppercase;margin-top:10px;}
</style></head><body><div class="card">
  <div class="row">
    <span class="chip on">700k-follower client</span>
    <span class="chip on">Ready in 8 days</span>
    <span class="chip off">An Giang based</span>
  </div>
  <div class="row">
    <span class="chip round"><span class="dot"></span>Available now</span>
    <span class="chip round">2026</span>
    <span class="chip round">Demo</span>
  </div>
  <div class="lbl">Proof chips (square) · status pills (round)</div>
</div></body></html>
