<!doctype html><html><head><meta charset="utf-8"><title>Components — Metric Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:18px 22px;font-family:var(--font-sans);}
  .panel{border-left:0.5px solid rgba(123,57,252,0.15);padding:4px 22px;display:flex;flex-direction:column;gap:0;max-width:260px;}
  .m{padding:16px 0;border-bottom:0.5px solid rgba(123,57,252,0.10);}
  .m:last-child{border-bottom:none;}
  .v{font-weight:700;font-size:30px;color:var(--fg1);line-height:1;}
  .u{color:var(--brand);font-size:18px;}
  .l{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.18em;color:var(--fg4);margin-top:5px;}
</style></head><body><div class="card">
  <div class="panel">
    <div class="m"><span class="v">700k<span class="u">+</span></span><div class="l">Social reach</div></div>
    <div class="m"><span class="v">8<span class="u"> days</span></span><div class="l">Avg. delivery</div></div>
    <div class="m"><span class="v">6<span class="u">+</span></span><div class="l">Sites launched</div></div>
  </div>
</div></body></html>
