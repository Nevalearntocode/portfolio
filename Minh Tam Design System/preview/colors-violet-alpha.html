<!doctype html><html><head><meta charset="utf-8"><title>Colors — Violet Alpha Ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:20px 22px;font-family:var(--font-sans);color:var(--fg1);}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;}
  .sw{height:80px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;border:0.5px solid var(--hairline-06);}
  .sw .n{font-family:var(--font-mono);font-size:9px;color:var(--fg1);}
  .note{margin-top:10px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:var(--fg4);text-transform:uppercase;}
</style></head><body><div class="card">
  <div class="row">
    <div class="sw" style="background:rgba(123,57,252,0.04)"><span class="n">04</span></div>
    <div class="sw" style="background:rgba(123,57,252,0.08)"><span class="n">08</span></div>
    <div class="sw" style="background:rgba(123,57,252,0.10)"><span class="n">10</span></div>
    <div class="sw" style="background:rgba(123,57,252,0.15)"><span class="n">15</span></div>
    <div class="sw" style="background:rgba(123,57,252,0.20)"><span class="n">20</span></div>
    <div class="sw" style="background:rgba(123,57,252,0.30)"><span class="n">30</span></div>
    <div class="sw" style="background:rgba(123,57,252,0.60)"><span class="n">60</span></div>
    <div class="sw" style="background:rgba(123,57,252,1.00)"><span class="n">100</span></div>
  </div>
  <div class="note">brand-a04 → brand (100%) — tint, don't shift hue</div>
</div></body></html>
