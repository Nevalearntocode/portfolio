<!doctype html><html><head><meta charset="utf-8"><title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:22px 24px;font-family:var(--font-sans);color:var(--fg1);}
  .row{display:flex;flex-direction:column;gap:8px;}
  .bar{display:flex;align-items:center;gap:10px;}
  .bar .tok{width:48px;font-family:var(--font-mono);font-size:10px;color:var(--fg3);}
  .bar .block{height:10px;background:var(--brand);border-radius:2px;}
  .bar .px{font-family:var(--font-mono);font-size:10px;color:var(--fg4);margin-left:auto;}
</style></head><body><div class="card">
  <div class="row">
    <div class="bar"><span class="tok">--1</span><span class="block" style="width:4px"></span><span class="px">4</span></div>
    <div class="bar"><span class="tok">--2</span><span class="block" style="width:8px"></span><span class="px">8</span></div>
    <div class="bar"><span class="tok">--3</span><span class="block" style="width:12px"></span><span class="px">12</span></div>
    <div class="bar"><span class="tok">--4</span><span class="block" style="width:16px"></span><span class="px">16</span></div>
    <div class="bar"><span class="tok">--6</span><span class="block" style="width:24px"></span><span class="px">24</span></div>
    <div class="bar"><span class="tok">--8</span><span class="block" style="width:32px"></span><span class="px">32</span></div>
    <div class="bar"><span class="tok">--12</span><span class="block" style="width:48px"></span><span class="px">48</span></div>
    <div class="bar"><span class="tok">--24</span><span class="block" style="width:96px"></span><span class="px">96 (py section)</span></div>
  </div>
</div></body></html>
