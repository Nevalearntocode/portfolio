<!doctype html><html><head><meta charset="utf-8"><title>Type — Body & Italic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:22px 24px;display:grid;grid-template-columns:1fr 1fr;gap:22px;}
  .box h3{font-family:var(--font-sans);font-weight:600;font-size:20px;color:#fff;margin:0 0 6px;}
  .box .serif{font-family:var(--font-serif);font-style:italic;font-size:20px;color:var(--fg2);margin-bottom:8px;}
  .box p{font-family:var(--font-sans);font-size:14px;line-height:1.7;color:var(--fg2);margin:0;}
  .label{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.18em;color:var(--fg4);margin-top:10px;}
</style></head><body><div class="card">
  <div class="box">
    <h3>Body — DM Sans 400</h3>
    <p>I design and build fast, beautiful websites for local businesses — from landing pages to full storefronts. Ready in days, not months.</p>
    <div class="label">14–15px · line-height 1.7 · #ccc3d9</div>
  </div>
  <div class="box">
    <div class="serif">Design is Strategy.</div>
    <div class="serif" style="color:rgba(255,255,255,0.15);font-size:40px;line-height:1.1">Crafted for impact.</div>
    <div class="label">Instrument Serif italic · display flourish</div>
  </div>
</div></body></html>
