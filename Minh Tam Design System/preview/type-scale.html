<!doctype html><html><head><meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);}
  .card{padding:18px 24px;font-family:var(--font-sans);color:var(--fg1);}
  .row{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:0.5px solid var(--hairline-06);}
  .row:last-child{border-bottom:none;}
  .tag{width:70px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:var(--fg4);text-transform:uppercase;}
  .spec{flex:1;color:var(--fg1);}
  .m{font-family:var(--font-mono);font-size:10px;color:var(--fg3);}
</style></head><body><div class="card">
  <div class="row"><span class="tag">H1</span><span class="spec" style="font-weight:700;font-size:40px;line-height:1;letter-spacing:-0.03em;">Modern websites</span><span class="m">52/700/-0.03em</span></div>
  <div class="row"><span class="tag">H2</span><span class="spec" style="font-weight:700;font-size:30px;letter-spacing:-0.02em;">The Process</span><span class="m">32/700</span></div>
  <div class="row"><span class="tag">H3</span><span class="spec" style="font-weight:600;font-size:20px;">Online Shop</span><span class="m">20/600</span></div>
  <div class="row"><span class="tag">BODY</span><span class="spec" style="font-size:14px;color:var(--fg2);">I build fast, clean websites for local businesses.</span><span class="m">14/400</span></div>
  <div class="row"><span class="tag">EYEBROW</span><span class="spec" style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(204,195,217,0.5)">WHAT I DO</span><span class="m">11/mono</span></div>
</div></body></html>
