<!doctype html><html><head><meta charset="utf-8"><title>Components — Process Step</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--surface-lowest);background-image:radial-gradient(rgba(123,57,252,0.15) 1px, transparent 1px);background-size:32px 32px;}
  .card{padding:26px 28px;font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
  .step{display:flex;flex-direction:column;align-items:center;text-align:center;}
  .n{font-weight:700;font-size:68px;color:rgba(255,255,255,0.05);line-height:1;margin-bottom:-14px;}
  h3{font-weight:700;font-size:18px;color:#fff;margin:0;position:relative;}
  h3::after{content:"";position:absolute;left:0;bottom:-4px;height:1px;background:var(--brand);width:100%;}
  p{font-size:11px;color:var(--fg2);margin:8px 0 0;max-width:180px;line-height:1.5;}
</style></head><body><div class="card">
  <div class="row">
    <div class="step"><div class="n">01</div><h3>Consult</h3><p>Tell me about your business.</p></div>
    <div class="step"><div class="n">02</div><h3>Build</h3><p>I design and develop your site.</p></div>
    <div class="step"><div class="n">03</div><h3>Launch</h3><p>Your site goes live.</p></div>
  </div>
</div></body></html>
